name: 🌟 GitHub Stars Index同步

on:
  # ── 定时触发 ──────────────────────────────────────────────
  # 修改下方 cron 表达式以自定义执行频率（UTC 时间）
  # 示例:
  #   "0 2 * * 1"   → 每周一 UTC 02:00（北京时间 10:00）
  #   "0 18 * * *"  → 每天 UTC 18:00（北京时间次日 02:00）
  #   "0 2 1 * *"   → 每月 1 日 UTC 02:00
  # cron 在线生成器: https://crontab.guru
  schedule:
    - cron: '18 18 * * *' # ← 在此修改你的定时频率

  # ── 手动触发 ──────────────────────────────────────────────
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: '强制重新生成所有摘要（重建 JSON 数据集）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      test_limit:
        description: '测试模式：限制处理的项目数量（如填 5 则只处理 5 个新项目，留空不限制）'
        required: false
        default: ''
        type: string

permissions:
  contents: write # 允许 Action 提交文件到本仓库

jobs:
  sync:
    name: 抓取 Stars 并生成摘要
    runs-on: ubuntu-latest
    timeout-minutes: 120 # 超时保护（Stars 较多时可能耗时长）

    steps:
      # ── 1. 检出代码 ───────────────────────────────────────
      - name: Checkout 仓库
        uses: actions/checkout@v4

      # ── 2. 设置 Python 环境 ───────────────────────────────
      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. 安装依赖 ───────────────────────────────────────
      - name: 安装依赖
        run: pip install -r requirements.txt

      # ── 4.1 准备 stars.json（优先 gh-pages，回退 main） ───────────
      - name: 准备 stars.json（gh-pages -> main fallback）
        id: seed_stars
        run: |
          set -e
          mkdir -p data
          tmp_file="$(mktemp)"
          git fetch origin gh-pages --depth=1 || true
          if git show origin/gh-pages:data/stars.json > "$tmp_file" 2>/dev/null && [ -s "$tmp_file" ]; then
            mv "$tmp_file" data/stars.json
            echo "✅ 已从 gh-pages 恢复 data/stars.json"
            echo "source=gh-pages" >> "$GITHUB_OUTPUT"
          elif [ -s data/stars.json ]; then
            rm -f "$tmp_file"
            echo "✅ 使用 main 分支现有 data/stars.json（首次迁移）"
            echo "source=main" >> "$GITHUB_OUTPUT"
          else
            rm -f "$tmp_file"
            echo "ℹ️ 未找到可复用 stars.json，将从空数据开始"
            rm -f data/stars.json
            echo "source=none" >> "$GITHUB_OUTPUT"
          fi

      # ── 4. 可选：强制重置数据集 ──────────────────────
      - name: 重置数据集（仅在 force_rebuild=true 时执行）
        if: github.event.inputs.force_rebuild == 'true'
        run: |
          echo "⚠️ 强制重建模式：删除现有数据"
          rm -rf data/stars.json

      # ── 5. 常规模式：正常同步（仅从 Secrets 注入） ─────────────────────
      - name: 同步 GitHub Stars
        shell: bash
        run: |
          set -euo pipefail

          export_if_present() {
            local key="$1"
            local value="$2"
            if [ -n "$value" ]; then
              export "$key=$value"
            fi
          }

          export GITHUB_TOKEN='${{ secrets.GITHUB_TOKEN }}'
          export GH_USERNAME='${{ secrets.GH_USERNAME }}'
          export AI_API_KEY='${{ secrets.AI_API_KEY }}'
          export PAGES_SYNC_ENABLED='true'

          export_if_present 'AI_BASE_URL' '${{ secrets.AI_BASE_URL }}'
          export_if_present 'AI_API_STYLE' '${{ secrets.AI_API_STYLE }}'
          export_if_present 'AI_MODEL' '${{ secrets.AI_MODEL }}'
          export_if_present 'AI_USER_AGENT' '${{ secrets.AI_USER_AGENT }}'
          export_if_present 'PAGES_DISALLOW_INDEXING' '${{ secrets.PAGES_DISALLOW_INDEXING }}'

          if [ -n '${{ github.event.inputs.test_limit }}' ]; then
            export TEST_LIMIT='${{ github.event.inputs.test_limit }}'
          fi

          export_if_present 'VAULT_PAT' '${{ secrets.VAULT_PAT }}'
          export_if_present 'NOTION_API_KEY' '${{ secrets.NOTION_API_KEY }}'
          export_if_present 'NOTION_PAGE_ID' '${{ secrets.NOTION_PAGE_ID }}'
          export_if_present 'NOTION_DATABASE_ID' '${{ secrets.NOTION_DATABASE_ID }}'
          export_if_present 'NOTION_DATABASE_TITLE' '${{ secrets.NOTION_DATABASE_TITLE }}'

          if [ -n '${{ secrets.NOTION_API_KEY }}' ] && \
             { [ -n '${{ secrets.NOTION_PAGE_ID }}' ] || [ -n '${{ secrets.NOTION_DATABASE_ID }}' ]; }; then
            export NOTION_SYNC_ENABLED='true'
          fi

          python scripts/sync_stars.py

      # ── 6. 准备 Pages 发布内容（包含 stars.json） ─────────────
      - name: 准备 gh-pages 发布目录
        run: |
          set -e
          test -s data/stars.json || { echo "❌ 未找到有效 data/stars.json"; exit 1; }
          mkdir -p dist/data
          cp data/stars.json dist/data/stars.json
          echo "✅ 已写入 dist/data/stars.json（仅发布到 gh-pages，不提交 main）"

      # ── 7. 部署到 GitHub Pages ─────────────────────────────
      - name: 部署到 GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # 同步 dist 文件夹的内容
          branch: gh-pages # 目标分支
          clean: true # 保持分支整洁
